[pytest]
# Keep bare `pytest` (run from the workspace root) out of the colcon build
# artifact dirs. After `colcon build`, install/ and build/ contain COPIES of
# the package test files; collecting those alongside the src/ originals raises
# ImportPathMismatchError (two files, same module name, different paths).
# These dirs are gitignored build output, so excluding them is safe. Imports of
# built packages (interfaces, perception) still resolve via the sourced
# install/setup.bash environment - this only affects test collection.
norecursedirs = build install log .git
