fine_align:
  ros__parameters:
    use_sim_time: true

    # Surge tuned down: fine was lurching into the dock when the align gate
    # opened. Lower kp_surge + v_max_surge cap the peak; a gentler slope starts
    # the distance-based deceleration earlier; a lower floor softens the final creep.
    kp_surge: 0.4
    kd_surge: 0.8      # brake the closing velocity so it settles at the target
    kp_sway: 0.8
    kd_sway: 0.0
    kp_heave: 2.0
    kd_heave: 0.0
    kp_yaw: 1.0
    kd_yaw: 0.0
    v_max_surge: 0.07
    v_max_sway: 0.15
    v_max_heave: 0.2
    v_max_yaw: 0.3
    approach_speed_slope: 0.10
    approach_speed_floor: 0.02

    target_frame: "map"
    # target IS the dock entry. Z=0.042 raises the aim 42mm above the dock pose
    # origin (per dock geometry); without it the vehicle settled ~4.5cm high and
    # never met the vertical align tolerance, so surge stayed gated to 0.
    aim_offset_in_dock: [0.0, 0.0, 0.042]
    standoff_distance_m: 0.0

    # align-then-advance gate tolerances. Vertical loosened to 0.06: pure-P heave
    # leaves a few-cm steady-state offset, and too-tight a tol keeps `aligned`
    # false forever (surge stays gated), stalling at the standoff.
    align_lateral_tol_m: 0.03
    align_vertical_tol_m: 0.06
    align_yaw_tol_rad: 0.05

    # seated latch tolerances
    seated_range_m: 0.10
    seated_lateral_tol_m: 0.03
    seated_vertical_tol_m: 0.03
    seated_yaw_tol_rad: 0.05
    seated_debounce_cycles: 10

    degraded_gain_scale: 0.5
    control_rate_hz: 20.0
    max_pose_age_s: 1.0
