fine_align:
  ros__parameters:
    use_sim_time: true

    kp_surge: 0.4
    kd_surge: 0.8      # brake the closing velocity; no physical stop at the dock
    kp_sway: 0.8
    kd_sway: 0.3       # damp the pure-P lateral wobble
    # STABILIZE (FSM sets it on FINE entry) gives heave to the controller; the
    # near-neutral vehicle holds depth on pure-P, so no integral term is needed.
    kp_heave: 2.0
    kd_heave: 0.0
    kp_yaw: 1.0
    kd_yaw: 0.0
    v_max_surge: 0.07
    v_max_sway: 0.15
    v_max_heave: 0.3
    v_max_yaw: 0.3
    approach_speed_slope: 0.10
    approach_speed_floor: 0.02

    target_frame: "map"
    aim_offset_in_dock: [0.0, 0.0, 0.0]   # aim at the true dock entry (pose origin)
    standoff_distance_m: 0.0

    # align-then-advance: `aligned` must mean the body has descended to entry height
    # before any surge, else it races forward high and lands on the dock.
    align_lateral_tol_m: 0.03
    align_vertical_tol_m: 0.025
    align_yaw_tol_rad: 0.05

    # seated_range_m = definition-of-done: within it (debounced) the FSM goes DOCKED
    # and disarms, freezing the vehicle. Tighter docks closer but the PD creeps
    # slowly in the final cm, risking a never-latching debounce.
    seated_range_m: 0.03
    seated_lateral_tol_m: 0.03
    seated_vertical_tol_m: 0.03
    seated_yaw_tol_rad: 0.05
    seated_debounce_cycles: 10

    degraded_gain_scale: 0.5
    control_rate_hz: 20.0
    max_pose_age_s: 1.0
