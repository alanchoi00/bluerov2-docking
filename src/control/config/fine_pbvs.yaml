fine_align:
  ros__parameters:
    use_sim_time: true

    # Surge tuned down: fine was lurching into the dock when the align gate
    # opened. Lower kp_surge + v_max_surge cap the peak; a gentler slope starts
    # the distance-based deceleration earlier; a lower floor softens the final creep.
    kp_surge: 0.4
    kd_surge: 0.8      # brake the closing velocity so it settles at the target
    kp_sway: 0.8
    kd_sway: 0.3      # damp the lateral limit-cycle wobble (pure-P sway oscillates)
    # FINE runs in STABILIZE (the FSM switches on entry), so the controller owns the
    # descent. The sim vehicle is near-neutrally buoyant, so a stiff pure-P heave
    # holds depth within the align/seated tolerances with no steady-state offset to
    # integrate away -- no integral term needed.
    kp_heave: 2.0
    kd_heave: 0.0
    kp_yaw: 1.0
    kd_yaw: 0.0
    v_max_surge: 0.07
    v_max_sway: 0.15
    v_max_heave: 0.3
    v_max_yaw: 0.3
    approach_speed_slope: 0.10
    approach_speed_floor: 0.02

    target_frame: "map"
    # Aim at the true dock entry (the dock pose origin). An earlier +0.042 Z was a
    # band-aid for a heave steady-state offset: it made `aligned` trigger while the
    # body was physically ~4cm high, so the vehicle nosed into the top of the dock
    # and jammed. In STABILIZE the controller holds the true entry height, so the aim
    # points at the real hole and the vehicle descends into it.
    aim_offset_in_dock: [0.0, 0.0, 0.0]
    standoff_distance_m: 0.0

    # align-then-advance gate tolerances. Vertical tightened to 0.025: in STABILIZE
    # the controller can drive the error to ~0 at the standoff with nothing fighting
    # it, so `aligned` must mean the body has actually descended to entry height
    # before any surge. This stops the vehicle racing forward while still high and
    # landing on top of the dock (it descends in open water first, then advances).
    align_lateral_tol_m: 0.03
    align_vertical_tol_m: 0.025
    align_yaw_tol_rad: 0.05

    # seated latch tolerances. Vertical 0.03: the integral holds the error near 0 in
    # STABILIZE, so a tight seat tol is achievable and ensures the vehicle has
    # physically entered the dock before latching.
    seated_range_m: 0.10
    seated_lateral_tol_m: 0.03
    seated_vertical_tol_m: 0.03
    seated_yaw_tol_rad: 0.05
    seated_debounce_cycles: 10

    degraded_gain_scale: 0.5
    control_rate_hz: 20.0
    max_pose_age_s: 1.0
