fine_align:
  ros__parameters:
    use_sim_time: true

    # Surge tuned down: fine was lurching into the dock when the align gate
    # opened. Lower kp_surge + v_max_surge cap the peak; a gentler slope starts
    # the distance-based deceleration earlier; a lower floor softens the final creep.
    kp_surge: 0.4
    kd_surge: 0.8      # brake the closing velocity so it settles at the target
    kp_sway: 0.8
    kd_sway: 0.3      # damp the lateral limit-cycle wobble (pure-P sway oscillates)
    kp_heave: 2.0
    kd_heave: 0.0
    # The vehicle is positively buoyant: pure-P heave settles a few cm high, so it
    # bumps the top of the dock and jams instead of entering. The integral term
    # supplies the constant down-thrust that holds it at the true entry height.
    # i_max_heave caps the integral's authority (anti-windup) to 0.1 m/s.
    ki_heave: 0.15
    kp_yaw: 1.0
    kd_yaw: 0.0
    v_max_surge: 0.07
    v_max_sway: 0.15
    v_max_heave: 0.2
    v_max_yaw: 0.3
    i_max_heave: 0.1
    approach_speed_slope: 0.10
    approach_speed_floor: 0.02

    target_frame: "map"
    # Aim at the true dock entry (the dock pose origin). The old +0.042 Z was a
    # band-aid for the heave steady-state offset: it made `aligned` trigger while
    # the body was physically ~4cm high, so the vehicle nosed into the top of the
    # dock and jammed. With ki_heave now closing the vertical error, the aim points
    # at the real hole and the vehicle descends into it.
    aim_offset_in_dock: [0.0, 0.0, 0.0]
    standoff_distance_m: 0.0

    # align-then-advance gate tolerances. Vertical tightened back to 0.04 now that
    # the integral closes the error: `aligned` must mean the body is genuinely at
    # the entry height (a few cm high is enough to bump the dock and jam), not just
    # near a raised aim point.
    align_lateral_tol_m: 0.03
    align_vertical_tol_m: 0.04
    align_yaw_tol_rad: 0.05

    # seated latch tolerances. Vertical tightened to 0.04 to match align: the
    # integral drives the steady-state vertical error to ~0, so a tight seat tol is
    # achievable and ensures the vehicle has physically entered before latching.
    seated_range_m: 0.10
    seated_lateral_tol_m: 0.03
    seated_vertical_tol_m: 0.04
    seated_yaw_tol_rad: 0.05
    seated_debounce_cycles: 10

    degraded_gain_scale: 0.5
    control_rate_hz: 20.0
    max_pose_age_s: 1.0
